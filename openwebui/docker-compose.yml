services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:cuda
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - openwebui-data:/app/backend/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - WEBUI_SECRET_KEY=my-secret-key
      # Database
      - DATABASE_URL=postgresql://openwebui:P%4088w0rd@host.docker.internal:5432/openwebui
      - DATABASE_POOL_SIZE=15
      - DATABASE_POOL_MAX_OVERFLOW=20
      # Vector Database
      - VECTOR_DB=pgvector
      - PGVECTOR_DB_URL=postgresql://openwebui:P%4088w0rd@host.docker.internal:5432/openwebui
      # Storage
      - STORAGE_PROVIDER=s3
      - S3_ACCESS_KEY_ID=minio
      - S3_SECRET_ACCESS_KEY=P@88w0rd
      - S3_ENDPOINT_URL=http://host.docker.internal:9000
      - S3_BUCKET_NAME=openwebui
      # Context Extraction
      - CONTENT_EXTRACTION_ENGINE=tika
      - TIKA_SERVER_URL=http://host.docker.internal:9998
      # Embeddings
      - RAG_EMBEDDING_ENGINE=ollama
      - RAG_EMBEDDING_MODEL=embeddinggemma
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

volumes:
  openwebui-data:
